name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags:
      - "v*"          # trigger on version tags: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Install deps + PyInstaller ────────────────────────────────────
      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      # ── 4. Build EXE with PyInstaller ────────────────────────────────────
      - name: Build EXE (PyInstaller)
        run: pyinstaller ig-normalizer.spec --clean --noconfirm

      - name: Verify EXE exists
        run: |
          if (!(Test-Path "dist\ig-normalizer.exe")) {
            Write-Error "PyInstaller build failed — exe not found"
            exit 1
          }
          Write-Host "EXE size: $((Get-Item 'dist\ig-normalizer.exe').Length / 1MB) MB"
        shell: pwsh

      # ── 5. Quick smoke test ───────────────────────────────────────────────
      - name: Smoke test EXE
        run: |
          $result = & "dist\ig-normalizer.exe" --test "Atlético MG / Goiás / Criciúma"
          Write-Host $result
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

      # ── 6. Inno Setup ────────────────────────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Build installer (Inno Setup)
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "installer\ig-normalizer.iss"
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

      - name: Verify installer exists
        run: |
          $setup = Get-ChildItem "installer\output\*.exe" | Select-Object -First 1
          if (!$setup) { Write-Error "Installer not found"; exit 1 }
          Write-Host "Installer: $($setup.FullName)"
          Write-Host "Size: $([math]::Round($setup.Length / 1MB, 2)) MB"
        shell: pwsh

      # ── 7. Upload artifacts ───────────────────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ig-normalizer-exe
          path: dist\ig-normalizer.exe
          retention-days: 30

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ig-normalizer-setup
          path: installer\output\*.exe
          retention-days: 30

      # ── 8. Create GitHub Release (only on version tags) ───────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\output\*.exe
          generate_release_notes: true
          name: "ig-normalizer ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
