name: Build Windows Installer

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build EXE (PyInstaller)
        run: pyinstaller ig-normalizer.spec --clean --noconfirm

      - name: Verify EXE exists
        shell: pwsh
        run: |
          if (!(Test-Path "dist\ig-normalizer.exe")) {
            Write-Error "PyInstaller build failed"
            exit 1
          }
          Write-Host "EXE size: $([math]::Round((Get-Item 'dist\ig-normalizer.exe').Length / 1MB, 2)) MB"

      - name: Smoke test EXE
        shell: pwsh
        run: |
          $result = & "dist\ig-normalizer.exe" --test "Atletico MG / Goias / Criciuma"
          Write-Host $result
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "installer\ig-normalizer.iss"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Verify installer exists
        shell: pwsh
        run: |
          $setup = Get-ChildItem "installer\output\*.exe" | Select-Object -First 1
          if (!$setup) { Write-Error "Installer not found"; exit 1 }
          Write-Host "Installer: $($setup.FullName) — $([math]::Round($setup.Length / 1MB, 2)) MB"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ig-normalizer-exe
          path: dist\ig-normalizer.exe
          retention-days: 30

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ig-normalizer-setup
          path: installer\output\*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\output\*.exe
          generate_release_notes: true
          name: "ig-normalizer ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
